<div class="funding-activity funding-application-snapshot-creation panel panel-info">
  <div class="funding-activity-title panel-heading">
    {{ ts('Snapshot created', {}) }}
    <i class="fa fa-camera"></i>
  </div>
  <div class="panel-body">
    <div class="funding-activity-date">{{ ts('Date: %date', {date: (activity.created_date | fundingDate)}) }}</div>
    <div class="funding-activity-performed-by">{{ ts('Performed by: %name', {name: activity.source_contact_name}) }}</div>
    <div ng-if="snapshotId" style="margin-top: 10px;">
      <button class="btn btn-xs btn-info" ng-click="openDiffDialog()">
        <i class="fa fa-columns"></i> {{ ts('Show Changes') }}
      </button>
    </div>
  </div>
</div>
