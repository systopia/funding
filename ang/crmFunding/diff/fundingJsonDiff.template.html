<table class="funding-diff-table">
  <thead>
  <tr>
    <th class="col-data">{{ leftLabel }}</th>
    <th class="col-data">{{ rightLabel }}</th>
  </tr>
  </thead>
  <tbody>
  <tr>
    <td class="data-snapshot" ng-bind-html="leftDiff"></td>
    <td class="data-current" ng-bind-html="rightDiff"></td>
  </tr>
  </tbody>
</table>
