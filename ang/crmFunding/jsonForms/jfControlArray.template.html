<funding-validation-errors errors="errors[errorsJsonPointer]"></funding-validation-errors>
<table class="table table-striped table-bordered table-hover table-condensed">
  <thead>
    <tr>
      <th ng-repeat="label in header track by $index">{{ label }}</th>
      <th>{{:: ts('Actions') }}</th>
    </tr>
  </thead>
  <tbody>
    <tr ng-repeat="row in value track by $index" edit-allowed="editable" path="{{ path }}" funding-editable-table-row>
      <td ng-repeat="cellElement in elements track by $index">
        <funding-jf-element json-schema="propertySchema.items" ui-schema="cellElement"
                            error-path-prefix="{{ path }}[{{ $index }}]" data="row"
                            editable="editable" errors="errors" no-label="true"></funding-jf-element>
      </td>
      <td class="editable-table-row-actions"></td>
    </tr>
    <tr ng-show="value.length === 0">
      <td colspan="{{ elements.length + 1 }}" style="text-align: center;">{{:: ts('No data')}}</td>
    </tr>
  </tbody>
</table>
<funding-add-row-button path="{{ path }}" ng-show="editable"></funding-add-row-button>
